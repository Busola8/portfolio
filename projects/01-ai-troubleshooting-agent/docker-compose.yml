services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: troubleshooting
      POSTGRES_USER: troubleshooting
      POSTGRES_PASSWORD: troubleshooting
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres-data:
