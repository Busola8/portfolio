<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Troubleshooting Agent</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">LLM-Based RCA Console</p>
          <h1>AI Troubleshooting Agent</h1>
        </div>
        <a href="../../index.html">Portfolio</a>
      </header>

      <section class="incident-panel">
        <div class="status-strip">
          <span>payments-api</span>
          <strong>p95 1840ms</strong>
          <strong>12% errors</strong>
          <strong>DB pool saturated</strong>
        </div>
        <form id="troubleshoot-form">
          <label for="message">Incident prompt</label>
          <textarea id="message" rows="5">Checkout is timing out in payments-api and customers are seeing 503 errors. What is the likely root cause and what should the on-call team do?</textarea>
          <div class="form-row">
            <select id="severity" aria-label="Severity">
              <option value="high">High</option>
              <option value="critical">Critical</option>
              <option value="medium">Medium</option>
            </select>
            <button type="submit">Run Diagnosis</button>
          </div>
        </form>
      </section>

      <section class="results-grid">
        <article class="result-card primary">
          <h2>Root Cause</h2>
          <p id="root-cause">Run a diagnosis to generate the root cause analysis.</p>
          <div class="confidence">
            <span>Confidence</span>
            <strong id="confidence">--</strong>
          </div>
        </article>
        <article class="result-card">
          <h2>Remediation</h2>
          <ol id="remediation"></ol>
        </article>
        <article class="result-card">
          <h2>Retrieved Evidence</h2>
          <div id="evidence"></div>
        </article>
        <article class="result-card">
          <h2>Session Memory</h2>
          <div id="memory"></div>
        </article>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
